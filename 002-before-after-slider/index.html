<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaudeParts. 002 / Before/After スライダー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="jc-page-header">
  <p class="jc-page-header__eyebrow">ClaudeParts. — 002</p>
  <h1 class="jc-page-header__title">Before / After スライダー</h1>
  <p class="jc-page-header__lead">施工の変化を"測る"イメージで、巻尺のグリップをスライダーにしました。</p>
</header>

<main class="jc-stage">
  <div class="jc-grid">

    <!-- 1枚目 -->
    <article class="ba-card">
      <div class="ba-card__body">
        <p class="ba-card__eyebrow">施工実績 <span class="ba-card__no">No.014</span></p>
        <h3 class="ba-card__title">S様邸　外壁・屋根改修工事</h3>
      </div>

      <div class="ba-slider" style="--pos:50">
        <div class="ba-slider__frame">

          <div class="ba-slider__img ba-slider__img--before" aria-hidden="true">
            <svg viewBox="0 0 64 64" class="ba-slider__icon ba-slider__icon--before">
              <path d="M8 52 L8 26 L32 14 L56 26 L56 52 Z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-dasharray="2 2"/>
              <path d="M20 52 V36 H32 V52" fill="none" stroke="currentColor" stroke-width="1.1" stroke-dasharray="2 2"/>
              <path d="M4 52 H60" stroke="currentColor" stroke-width="1.4"/>
            </svg>
            <span class="ba-slider__tag ba-slider__tag--before">改修前</span>
          </div>

          <div class="ba-slider__img ba-slider__img--after" aria-hidden="true">
            <svg viewBox="0 0 64 64" class="ba-slider__icon ba-slider__icon--after">
              <path d="M8 52 L8 26 L32 14 L56 26 L56 52 Z" fill="none" stroke="currentColor" stroke-width="1.6"/>
              <path d="M20 52 V36 H32 V52" fill="none" stroke="currentColor" stroke-width="1.4"/>
              <path d="M4 52 H60" stroke="currentColor" stroke-width="1.8"/>
              <path d="M46 22 L50 26 L58 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="ba-slider__tag ba-slider__tag--after">改修後</span>
          </div>

          <div class="ba-slider__divider" aria-hidden="true">
            <div class="ba-slider__handle">
              <svg viewBox="0 0 40 40">
                <circle cx="20" cy="20" r="18" fill="var(--paper)" stroke="var(--stamp-red)" stroke-width="2"/>
                <path d="M10 20 H30 M12 15 V20 M16 17 V20 M20 15 V20 M24 17 V20 M28 15 V20" stroke="var(--stamp-red)" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </div>
          </div>

          <input
            type="range"
            class="ba-slider__range"
            min="0" max="100" value="50"
            aria-label="施工前後比較スライダー：S様邸 外壁・屋根改修工事">
        </div>
      </div>

      <p class="ba-card__caption">スライダーを動かすと、施工前後の写真を比較できます。</p>
    </article>

    <!-- 2枚目 -->
    <article class="ba-card">
      <div class="ba-card__body">
        <p class="ba-card__eyebrow">施工実績 <span class="ba-card__no">No.011</span></p>
        <h3 class="ba-card__title">T様邸　外壁塗装工事</h3>
      </div>

      <div class="ba-slider" style="--pos:35">
        <div class="ba-slider__frame">

          <div class="ba-slider__img ba-slider__img--before" aria-hidden="true">
            <svg viewBox="0 0 64 64" class="ba-slider__icon ba-slider__icon--before">
              <rect x="12" y="14" width="40" height="38" fill="none" stroke="currentColor" stroke-width="1.3" stroke-dasharray="2 2"/>
              <path d="M12 26 H52 M22 14 V52 M42 14 V52" stroke="currentColor" stroke-width="1"/>
              <path d="M4 52 H60" stroke="currentColor" stroke-width="1.4"/>
            </svg>
            <span class="ba-slider__tag ba-slider__tag--before">改修前</span>
          </div>

          <div class="ba-slider__img ba-slider__img--after" aria-hidden="true">
            <svg viewBox="0 0 64 64" class="ba-slider__icon ba-slider__icon--after">
              <rect x="12" y="14" width="40" height="38" fill="none" stroke="currentColor" stroke-width="1.6"/>
              <path d="M12 26 H52 M22 14 V52 M42 14 V52" stroke="currentColor" stroke-width="1.3"/>
              <path d="M4 52 H60" stroke="currentColor" stroke-width="1.8"/>
              <path d="M46 22 L50 26 L58 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="ba-slider__tag ba-slider__tag--after">改修後</span>
          </div>

          <div class="ba-slider__divider" aria-hidden="true">
            <div class="ba-slider__handle">
              <svg viewBox="0 0 40 40">
                <circle cx="20" cy="20" r="18" fill="var(--paper)" stroke="var(--stamp-red)" stroke-width="2"/>
                <path d="M10 20 H30 M12 15 V20 M16 17 V20 M20 15 V20 M24 17 V20 M28 15 V20" stroke="var(--stamp-red)" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </div>
          </div>

          <input
            type="range"
            class="ba-slider__range"
            min="0" max="100" value="35"
            aria-label="施工前後比較スライダー：T様邸 外壁塗装工事">
        </div>
      </div>

      <p class="ba-card__caption">スライダーを動かすと、施工前後の写真を比較できます。</p>
    </article>

  </div>
</main>

<script src="script.js"></script>
</body>
</html>
